<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Прости меня 🥺</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Nunito:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ffe6fa 0%, #ffc0cb 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            color: #d81b60;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(216, 27, 96, 0.2);
            line-height: 1.1;
        }

        p {
            font-size: 1.5rem;
            color: #880e4f;
            margin-bottom: 40px;
        }

        .buttons-wrapper {
            position: relative;
            width: 100%;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            font-family: 'Nunito', sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        #btn-yes {
            background: linear-gradient(45deg, #ff4b82, #ff758c);
            color: white;
            z-index: 20;
        }

        #btn-yes:active {
            transform: scale(0.95);
        }

        #btn-no {
            background-color: white;
            color: #ff4b82;
            position: absolute;
            /* Плавное убегание кнопки */
            transition: left 0.3s ease, top 0.3s ease;
            z-index: 15;
        }

        #success-screen {
            display: none;
            text-align: center;
            z-index: 10;
            animation: fadeIn 1s;
        }

        #success-screen h1 {
            font-size: 4.5rem;
            margin-bottom: 20px;
        }

        .gif-container img {
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(216, 27, 96, 0.3);
            max-width: 80%;
            border: 5px solid white;
        }

        .heart {
            position: absolute;
            bottom: -20px;
            font-size: 1.5rem;
            color: rgba(255, 75, 130, 0.6);
            animation: floatUp 5s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="question-container">
        <h1>Прости меня 🥺</h1>
        <p>Фари, ты меня прощаешь?</p>
        
        <div class="buttons-wrapper">
            <button id="btn-yes">Да!</button>
            <button id="btn-no">Нет</button>
        </div>
    </div>

    <div id="success-screen">
        <h1>Ура! Я люблю тебя! ❤️</h1>
        <div class="gif-container">
            <!-- Милая гифка с обнимающимися мишками -->
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTI3MmM1M2U2YzI3MmNiY2I0M2Q3NjA5ZTI1YmE3NjEwYmU5MzQ3ZCZlcD12MV9pbnRlcm5hbF9naWZzX2dpZklkJmN0PWc/f3IWwxbU39aQ4015fG/giphy.gif" alt="Hugs">
        </div>
    </div>

    <script>
        // Анимация фоновых сердечек
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const hearts = ['❤️', '💖', '💕', '🌸', '🥺'];
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }

        setInterval(createHeart, 400);

        // Логика кнопок
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const questionContainer = document.getElementById('question-container');
        const successScreen = document.getElementById('success-screen');

        // Изначально ставим кнопку "Нет" рядом с "Да"
        btnNo.style.left = "calc(50% + 10px)";
        btnNo.style.top = "50px";

        // Функция убегания кнопки
        function runAway() {
            const maxX = window.innerWidth - btnNo.offsetWidth - 20;
            const maxY = window.innerHeight - btnNo.offsetHeight - 20;
            
            // Генерируем случайные координаты
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));
            
            // Меняем позиционирование на fixed, чтобы летать по всему экрану
            btnNo.style.position = 'fixed';
            btnNo.style.left = `${randomX}px`;
            btnNo.style.top = `${randomY}px`;
        }

        // Кнопка убегает при наведении мышки (для ПК)
        btnNo.addEventListener('mouseover', runAway);
        
        // Кнопка убегает при попытке нажать пальцем (для телефона)
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Запрещаем клик
            runAway();
        }, { passive: false });

        // Если она нажмет "Да!"
        btnYes.addEventListener('click', () => {
            questionContainer.style.display = 'none';
            successScreen.style.display = 'block';
            // Делаем больше сердечек от радости
            setInterval(createHeart, 150);
        });
    </script>

</body>
</html>
